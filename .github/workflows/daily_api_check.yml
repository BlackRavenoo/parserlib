name: Daily API Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  api-check:
    name: Verify clients are still working
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          activate-environment: "true"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install project
        run: uv sync

      - name: Run api tests
        run: uv run pytest -m "api"

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `[API broken] Daily check failed — ${today}`,
              body: [
                '## Daily API check failed',
                '',
                'One or more site clients returned unexpected responses.',
                'The source site may have changed its API.',
                '',
                `**Workflow run:** ${runUrl}`,
              ].join('\n'),
              labels: ['api-broken', 'automated'],
            });
